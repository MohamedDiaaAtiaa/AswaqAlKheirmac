<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshMart Admin Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Auth View -->
    <div id="login-container" class="view hidden">
      <div class="login-card">
        <h1>FreshMart Admin</h1>
        <p>Sign in to manage your store</p>
        <form id="login-form">
          <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" required placeholder="admin@freshmart.com">
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn-primary">Sign In</button>
        </form>
        <p id="auth-error" class="error-text"></p>
      </div>
    </div>

    <!-- Main Dashboard View -->
    <div id="dashboard-container" class="view hidden">
      <aside class="sidebar">
        <div class="sidebar-header">
          <span class="logo-emoji">🛒</span>
          <span class="logo-text">FreshMart</span>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-item active" data-page="inventory">
            <span class="nav-icon">📦</span> Inventory
          </button>
          <button class="nav-item" data-page="orders">
            <span class="nav-icon">🔔</span> Orders
            <span id="order-badge" class="badge hidden">0</span>
          </button>
          <button class="nav-item" data-page="users">
            <span class="nav-icon">👥</span> Users
          </button>
          <button class="nav-item" data-page="marketing">
            <span class="nav-icon">✨</span> Marketing
          </button>
        </nav>
        <div class="sidebar-footer">
          <button id="logout-btn" class="nav-item">
            <span class="nav-icon">🚪</span> Logout
          </button>
        </div>
      </aside>
      
      <main class="content-area">
        <header class="content-header">
          <h2 id="page-title">Inventory</h2>
          <div style="display: flex; gap: 1rem; align-items: center;">
            <button id="lang-toggle" class="translator-btn">
              <span>🌐</span>
              <span id="lang-text">English</span>
            </button>
            <div class="header-actions" id="header-actions">
              <!-- Dynamic actions based on page -->
            </div>
          </div>
        </header>
        
        <div id="page-content" class="page-content">
          <!-- Dynamically loaded content -->
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
